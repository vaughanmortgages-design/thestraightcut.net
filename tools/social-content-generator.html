<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>The Straight Cut Content Generator</title><style>body{font-family:Arial,sans-serif;background:#080808;color:#f5f5f5;margin:0;padding:24px}.wrap{max-width:920px;margin:auto}h1{color:#d9d9d9}label{display:block;margin-top:14px;font-weight:bold}input,select,textarea,button{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid #444;padding:12px;margin-top:6px;font-size:16px}input,select,textarea{background:#171717;color:#fff}button{background:#f5f5f5;color:#080808;font-weight:bold;border:0;margin-top:18px}.card{background:#141414;border:1px solid #333;border-radius:16px;padding:18px;margin-top:18px;white-space:pre-wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><h1>The Straight Cut Content Generator</h1><p>Creates product posts, deal captions, Pinterest pins and short video scripts.</p><div class="grid"><div><label>Product / topic</label><input id="topic" placeholder="Kitchen gadget, travel find, home product"/></div><div><label>Format</label><select id="format"><option>Instagram Reel</option><option>Instagram Caption</option><option>Product Post</option><option>TikTok Script</option><option>Pinterest Pin</option></select></div></div><label>Product link</label><input id="link" placeholder="straightcut.net or affiliate link"/><label>Why it matters</label><textarea id="point" rows="3" placeholder="Useful because..."></textarea><button onclick="generate()">Generate</button><div id="out" class="card">Your content will appear here.</div></div><script>function generate(){const topic=document.getElementById('topic').value||'smart home find';const format=document.getElementById('format').value;const link=document.getElementById('link').value||'straightcut.net';const point=document.getElementById('point').value||'A simple upgrade that makes daily life easier.';const hooks=[`This ${topic} is actually useful.`,`Before you buy another random gadget, see this.`,`A simple find that makes home life easier.`];const hook=hooks[Math.floor(Math.random()*hooks.length)];document.getElementById('out').textContent=`FORMAT: ${format}\n\nHOOK:\n${hook}\n\nON-SCREEN TEXT:\n${topic.toUpperCase()}\nWorth it or skip it?\n\nSCRIPT / CAPTION:\n${point}\n\nThe Straight Cut highlights useful home, travel and everyday finds without the fluff. Compare price, reviews and fit before buying.\n\nCTA:\nSee more finds at ${link}\n\nHASHTAGS:\n#TheStraightCut #HomeFinds #AmazonFinds #TravelFinds #SmartShopping #DealFinds\n\nDISCLOSURE:\nThe Straight Cut may earn from qualifying purchases or affiliate links at no extra cost to you.`}</script><script src="https://www.dwin2.com/pub.2902393.min.js"></script></body></html>
